<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Gotabiat - Animated Logo</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5efdf;
  }

  .logo-wrap {
    width: min(70vw, 420px);
  }

  svg {
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* ---- whole face gently bobbing ---- */
  #face {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: bob 3.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-6px) rotate(-1deg); }
  }

  /* ---- background square: soft breathing pulse ---- */
  #bg {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.015); }
  }

  /* ---- eyes: blink ---- */
  #eye-left, #eye-right {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: blink 4.5s ease-in-out infinite;
  }
  #eye-right { animation-delay: 0.06s; }
  @keyframes blink {
    0%, 88%, 100% { transform: scaleY(1); }
    92%           { transform: scaleY(0.08); }
    96%           { transform: scaleY(1); }
  }

  /* ---- ears: wiggle ---- */
  #ear-right {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: wiggle-right 3.2s ease-in-out infinite;
  }
  #ear-left {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    animation: wiggle-left 3.2s ease-in-out infinite;
  }
  @keyframes wiggle-right {
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(4deg); }
    75%      { transform: rotate(-2deg); }
  }
  @keyframes wiggle-left {
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(-4deg); }
    75%      { transform: rotate(2deg); }
  }

  /* ---- mouth: happy pulse ---- */
  #mouth {
    transform-box: fill-box;
    transform-origin: 50% 0%;
    animation: smile 3.2s ease-in-out infinite;
  }
  @keyframes smile {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }

  /* ---- little accent shape under the eyes ---- */
  #accent {
    transform-box: fill-box;
    transform-origin: 50% 0%;
    animation: sway 3.2s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(2deg); }
  }

  #nose {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    animation: nose-pulse 3.2s ease-in-out infinite;
  }
  @keyframes nose-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }
</style>
